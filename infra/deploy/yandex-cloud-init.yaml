#cloud-config
package_update: true
package_upgrade: false

packages:
  - git
  - curl
  - ca-certificates
  - python3
  - python3-pip

write_files:
  - path: /opt/scientific-tangle-deploy.env
    permissions: "0644"
    content: |
      PUBLIC_HOST=YOUR_PUBLIC_IP
      REPO_URL=https://github.com/EstrNous/ScientificTangle.git
      BRANCH=dev

runcmd:
  - curl -fsSL https://get.docker.com | sh
  - usermod -aG docker ubuntu || true
  - |
    set -euo pipefail
    source /opt/scientific-tangle-deploy.env
    git clone --depth 1 --branch "${BRANCH}" "${REPO_URL}" /opt/ScientificTangle
    cd /opt/ScientificTangle
    chmod +x scripts/cloud_deploy.sh
    ./scripts/cloud_deploy.sh "${PUBLIC_HOST}" --no-demo
  - |
    if [ -f /opt/ScientificTangle/infra/deploy/credentials.txt ]; then
      cp /opt/ScientificTangle/infra/deploy/credentials.txt /root/scientific-tangle-credentials.txt
      chmod 600 /root/scientific-tangle-credentials.txt
    fi

final_message: "ScientificTangle cloud-init finished. Run deploy with demo: cd /opt/ScientificTangle && ./scripts/cloud_deploy.sh YOUR_PUBLIC_IP"
