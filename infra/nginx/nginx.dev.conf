events {
    worker_connections 1024;
}

http {
    map $http_x_request_id $proxy_request_id {
        default $http_x_request_id;
        "" $connection$connection_requests$msec;
    }

    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream gateway {
        server gateway:8000;
    }

    upstream auth_audit {
        server auth_audit:8001;
    }

    upstream orchestrator {
        server orchestrator:8002;
    }

    upstream ingestion {
        server ingestion:8003;
    }

    upstream knowledge {
        server knowledge:8004;
    }

    upstream retrieval {
        server retrieval:8005;
    }

    upstream model_svc {
        server model:8006;
    }

    upstream ui {
        server ui:3000;
    }

    upstream grafana {
        server grafana:3000;
    }

    server {
        listen 80;
        server_name localhost;

        client_max_body_size 100M;

        location /api/auth/ {
            proxy_pass http://auth_audit;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $proxy_request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /.well-known/jwks.json {
            proxy_pass http://auth_audit;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $proxy_request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            proxy_pass http://gateway/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $proxy_request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /orchestrator/ {
            proxy_pass http://orchestrator/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $proxy_request_id;
        }

        location /ingestion/ {
            proxy_pass http://ingestion/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $proxy_request_id;
        }

        location /knowledge/ {
            proxy_pass http://knowledge/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $proxy_request_id;
        }

        location /retrieval/ {
            proxy_pass http://retrieval/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $proxy_request_id;
        }

        location /model/ {
            proxy_pass http://model_svc/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $proxy_request_id;
        }

        location /grafana/ {
            auth_basic "Grafana Admin";
            auth_basic_user_file /etc/nginx/grafana.htpasswd;
            proxy_pass http://grafana;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        location / {
            proxy_pass http://ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
