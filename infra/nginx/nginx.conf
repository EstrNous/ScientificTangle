upstream gateway {
    server gateway:8000;
}

upstream auth_audit {
    server auth_audit:8001;
}

upstream orchestrator {
    server orchestrator:8002;
}

upstream ingestion {
    server ingestion:8003;
}

upstream knowledge {
    server knowledge:8004;
}

upstream retrieval {
    server retrieval:8005;
}

upstream model_svc {
    server model:8006;
}

upstream export_svc {
    server export:8007;
}

upstream notification_svc {
    server notification:8008;
}

upstream ui {
    server ui:3000;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 100M;

    location /api/ {
        proxy_pass http://gateway/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /auth/ {
        proxy_pass http://auth_audit/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    location /orchestrator/ {
        proxy_pass http://orchestrator/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    location /ingestion/ {
        proxy_pass http://ingestion/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    location /knowledge/ {
        proxy_pass http://knowledge/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    location /retrieval/ {
        proxy_pass http://retrieval/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    location /model/ {
        proxy_pass http://model_svc/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    location /export/ {
        proxy_pass http://export_svc/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    location /notification/ {
        proxy_pass http://notification_svc/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    location / {
        proxy_pass http://ui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
