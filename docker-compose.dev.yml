services:
  postgres:
    ports:
      - "5432:5432"

  neo4j:
    ports:
      - "7474:7474"
      - "7687:7687"

  qdrant:
    ports:
      - "6333:6333"
      - "6334:6334"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  redis:
    ports:
      - "6379:6379"

  ui:
    ports:
      - "3000:3000"

  gateway:
    ports:
      - "8000:8000"

  auth_audit:
    ports:
      - "8001:8001"

  orchestrator:
    ports:
      - "8002:8002"

  ingestion:
    ports:
      - "8003:8003"

  knowledge:
    ports:
      - "8004:8004"

  retrieval:
    ports:
      - "8005:8005"

  model:
    ports:
      - "8006:8006"

  prometheus:
    ports:
      - "9090:9090"

  grafana:
    ports:
      - "3001:3000"

  nginx:
    ports:
      - "80:80"
    environment:
      NGINX_CONFIG: dev
    volumes:
      - ./infra/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
