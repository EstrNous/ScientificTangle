services:
  nginx:
    ports: !override
      - "${NGINX_HTTP_PORT:-80}:80"
    environment: !override
      NGINX_CONFIG: cloud
      GRAFANA_NGINX_BASIC_USER: ${GRAFANA_NGINX_BASIC_USER:-grafana}
      GRAFANA_NGINX_BASIC_PASSWORD: ${GRAFANA_NGINX_BASIC_PASSWORD:-grafana123}
    volumes: !override
      - ./infra/nginx/nginx.cloud.http.conf:/etc/nginx/nginx.conf:ro
    healthcheck: !override
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
